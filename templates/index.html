<!DOCTYPE html>
<html>
<head>
    <title>Cloud Cost Optimizer</title>
</head>
<body>

    <h1>Cloud Cost Dashboard</h1>

    <h2>Total Cost: ₹{{ cost }}</h2>

    {% if alert %}
        <p style="color:red; font-weight:bold;">
            {{ alert }}
        </p>
    {% endif %}

    <h3>Daily Costs:</h3>
    <ul>
        {% for cost in daily_costs %}
            <li>₹{{ cost }}</li>
        {% endfor %}
    </ul>

</body>
</html>
<h3>Cost Graph:</h3>
<img src="{{ graph }}" width="500">
